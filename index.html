<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rust webui integration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/css/winbox.min.css">
  <script>window.__WS_PORT__ = 9876;</script>
  <script>
    // Ultra-early error handler - catches errors before any framework loads
    window.__EARLY_ERRORS__ = [];
    window.onerror = function(msg, url, line, col, error) {
      const err = { msg, url, line, col, error: error?.stack || error?.message || String(error), time: Date.now() };
      window.__EARLY_ERRORS__.push(err);
      console.error('[EARLY ERROR]', err);
      const app = document.getElementById('app');
      if (app) {
        app.innerHTML = '<div style="padding:20px;color:red;background:#ffe6e6;"><h2>JavaScript Error</h2><pre>' + JSON.stringify(err, null, 2) + '</pre></div>';
      }
      return true;
    };
    window.onunhandledrejection = function(e) {
      const err = { reason: e.reason?.stack || e.reason?.message || String(e.reason), time: Date.now() };
      window.__EARLY_ERRORS__.push(err);
      console.error('[EARLY UNHANDLED REJECTION]', err);
    };
  </script>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/js/winbox.min.js"></script>
</body>
</html>
